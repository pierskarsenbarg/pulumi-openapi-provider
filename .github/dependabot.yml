version: 2
updates:
  - package-ecosystem: "gomod"
    directories:
      - "/"
      - "/examples/*"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "05:00"
    assignees:
      - "pierskarsenbarg"
    ignore:
      - dependency-name: "github.com/pulumi/pulumi/pkg/v3"
      - dependency-name: "github.com/pulumi/pulumi/sdk/v3"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "05:00"
    assignees:
      - "pierskarsenbarg"
