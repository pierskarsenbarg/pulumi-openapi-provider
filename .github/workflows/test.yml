name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: make test
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  discover-examples:
    runs-on: ubuntu-latest
    needs:
      - run-tests
      - lint
    outputs:
      examples: ${{ steps.list.outputs.examples }}
    steps:
      - uses: actions/checkout@v7

      - name: List examples
        id: list
        run: |
          examples=$(ls -d examples/*/ | xargs -I{} basename {} | grep -v '^openapi-k8s$' | jq -R . | jq -sc .)
          echo "examples=$examples" >> $GITHUB_OUTPUT

  code-provider-integration-tests:
    runs-on: ubuntu-latest
    needs:
      - run-tests
      - lint
    defaults:
      run:
        working-directory: integration-tests
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: integration-tests/code-provider/provider/go.mod
          cache: true
          cache-dependency-path: integration-tests/code-provider/provider/go.sum

      - uses: oven-sh/setup-bun@v2

      - uses: pulumi/actions@v7
        with:
          pulumi-version: latest

      - name: Install API dependencies
        run: make install-api

      - name: Run database migrations
        run: make migrate

      - name: Start API in background
        run: cd api && bun run src/index.ts &

      - name: Wait for API to be ready
        timeout-minutes: 1
        run: until curl -sf http://localhost:3000/openapi > /dev/null; do sleep 1; done

      - name: Configure local Pulumi backend
        run: pulumi login --local

      - name: Run code provider integration tests
        run: make test-code-provider
        env:
          PULUMI_CONFIG_PASSPHRASE: ""

  parameterized-provider-integration-tests:
    runs-on: ubuntu-latest
    needs:
      - run-tests
      - lint
    defaults:
      run:
        working-directory: integration-tests
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - uses: oven-sh/setup-bun@v2

      - uses: pulumi/actions@v7
        with:
          pulumi-version: latest

      - name: Install API dependencies
        run: make install-api

      - name: Run database migrations
        run: make migrate

      - name: Start API in background
        run: cd api && bun run src/index.ts &

      - name: Wait for API to be ready
        timeout-minutes: 1
        run: until curl -sf http://localhost:3000/openapi > /dev/null; do sleep 1; done

      - name: Configure local Pulumi backend
        run: pulumi login --local

      - name: Run parameterized provider integration tests (URL)
        run: make test-parameterized-provider
        env:
          PULUMI_CONFIG_PASSPHRASE: ""

      - name: Clean parameterized provider SDK artifacts
        run: make clean-param-sdk

      - name: Download OpenAPI spec to disk
        run: curl -sf http://localhost:3000/openapi -o parameterized-provider/openapi.json

      - name: Run parameterized provider integration tests (file path)
        run: make test-parameterized-provider-from-file
        env:
          PULUMI_CONFIG_PASSPHRASE: ""

  build-examples:
    runs-on: ubuntu-latest
    needs: discover-examples
    strategy:
      matrix:
        exampleDir: ${{ fromJson(needs.discover-examples.outputs.examples) }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: examples/${{ matrix.exampleDir }}/go.mod
          cache: true
          cache-dependency-path: examples/${{ matrix.exampleDir }}/go.sum

      - name: Install Pulumi CLI
        run: curl -fsSL https://get.pulumi.com | sh && echo "$HOME/.pulumi/bin" >> $GITHUB_PATH

      - name: Install mods
        run: make tidy

      - name: Build provider
        run: make bin/examples/pulumi-resource-${{ matrix.exampleDir }}

      - name: Get schema
        run: make examples/${{ matrix.exampleDir }}/schema.json

      - name: Generate SDKs
        run: make gen-sdk-${{ matrix.exampleDir }}

  check:
    runs-on: ubuntu-latest
    needs:
      - code-provider-integration-tests
      - parameterized-provider-integration-tests
      - build-examples
    steps:
      - name: Check workflow
        run: echo "All checks passed"
