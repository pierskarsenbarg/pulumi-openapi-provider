version: "2"

linters:
  enable:
    - goconst
    - gosec
    - lll
    - misspell
    - modernize
    - nakedret
    - revive
    - staticcheck
    - unconvert
    - usetesting
  settings:
    usetesting:
      os-temp-dir: true
      context-background: true
      context-todo: true
    revive:
      rules:
        - name: package-comments
          exclude:
            - '**/internal/**'
  exclusions:
    generated: lax
    paths:
      - vendor$
      - third_party$
      - testdata$

formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - vendor$
      - third_party$
      - testdata$
